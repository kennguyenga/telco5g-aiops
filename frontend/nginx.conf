server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxies — each routes to its respective service in the docker network
    location /api/orchestrator/ {
        rewrite ^/api/orchestrator/(.*) /api/$1 break;
        proxy_pass http://orchestrator:9001;
        proxy_set_header Host $host;
    }

    location /api/collector/ {
        rewrite ^/api/collector/(.*) /api/$1 break;
        proxy_pass http://collector:9000;
        proxy_set_header Host $host;
    }

    location /api/ml/ {
        proxy_pass http://ml_engine:9002;
        proxy_set_header Host $host;
    }

    location /api/llm/ {
        proxy_pass http://llm_agent:9003;
        proxy_set_header Host $host;
        # LLM agent loops can take 30-180s (multiple iterations, tool calls).
        # Gemini ~3s/turn × 6 iter = ~20s; Ollama ~30s/turn × 6 = ~3 min.
        proxy_read_timeout 240s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        # Disable buffering so streaming responses (if any) work
        proxy_buffering off;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
