# 5G AIOps — Render Blueprint
#
# Deploys 9 services: 5 NFs + collector + orchestrator + ml_engine + llm_agent
# plus 1 static frontend. Free tier supports this but you'll hit cold-start
# delays — for a smoother demo, upgrade backend services to the Starter plan.
#
# To deploy:
#   1. Push to GitHub
#   2. Render Dashboard → New + → Blueprint → connect repo
#   3. After provisioning, set ANTHROPIC_API_KEY in the llm-agent service env

services:
  # ─── 5G Core NFs ────────────────────────────────────────────────────
  - type: web
    name: aiops5g-nrf
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: nrf }
      - { key: PORT, value: "10000" }
    healthCheckPath: /healthz

  - type: web
    name: aiops5g-udm
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: udm }
      - { key: PORT, value: "10000" }
      - { key: NRF_URL, fromService: { name: aiops5g-nrf, type: web, envVarKey: RENDER_EXTERNAL_URL } }
    healthCheckPath: /healthz

  - type: web
    name: aiops5g-ausf
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: ausf }
      - { key: PORT, value: "10000" }
      - { key: NRF_URL, fromService: { name: aiops5g-nrf, type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: UDM_URL, fromService: { name: aiops5g-udm, type: web, envVarKey: RENDER_EXTERNAL_URL } }
    healthCheckPath: /healthz

  - type: web
    name: aiops5g-amf
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: amf }
      - { key: PORT, value: "10000" }
      - { key: NRF_URL,  fromService: { name: aiops5g-nrf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: AUSF_URL, fromService: { name: aiops5g-ausf, type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: UDM_URL,  fromService: { name: aiops5g-udm,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: SMF_URL,  fromService: { name: aiops5g-smf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
    healthCheckPath: /healthz

  - type: web
    name: aiops5g-smf
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: smf }
      - { key: PORT, value: "10000" }
      - { key: NRF_URL, fromService: { name: aiops5g-nrf, type: web, envVarKey: RENDER_EXTERNAL_URL } }
    healthCheckPath: /healthz

  # ─── Telemetry & Control ────────────────────────────────────────────
  - type: web
    name: aiops5g-collector
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: collector }
      - { key: PORT, value: "10000" }
      - { key: NRF_URL,  fromService: { name: aiops5g-nrf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: AUSF_URL, fromService: { name: aiops5g-ausf, type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: UDM_URL,  fromService: { name: aiops5g-udm,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: AMF_URL,  fromService: { name: aiops5g-amf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: SMF_URL,  fromService: { name: aiops5g-smf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
    healthCheckPath: /healthz

  - type: web
    name: aiops5g-orchestrator
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: orchestrator }
      - { key: PORT, value: "10000" }
      - { key: NRF_URL,  fromService: { name: aiops5g-nrf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: AUSF_URL, fromService: { name: aiops5g-ausf, type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: UDM_URL,  fromService: { name: aiops5g-udm,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: AMF_URL,  fromService: { name: aiops5g-amf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: SMF_URL,  fromService: { name: aiops5g-smf,  type: web, envVarKey: RENDER_EXTERNAL_URL } }
    healthCheckPath: /healthz

  - type: web
    name: aiops5g-ml-engine
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: ml_engine }
      - { key: PORT, value: "10000" }
      - { key: COLLECTOR_URL, fromService: { name: aiops5g-collector, type: web, envVarKey: RENDER_EXTERNAL_URL } }
    healthCheckPath: /healthz

  - type: web
    name: aiops5g-llm-agent
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - { key: SERVICE_NAME, value: llm_agent }
      - { key: PORT, value: "10000" }
      - { key: COLLECTOR_URL,    fromService: { name: aiops5g-collector,    type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: ORCHESTRATOR_URL, fromService: { name: aiops5g-orchestrator, type: web, envVarKey: RENDER_EXTERNAL_URL } }
      - { key: ANTHROPIC_API_KEY, sync: false }   # set manually in dashboard
      - { key: CLAUDE_MODEL, value: claude-sonnet-4-5 }
    healthCheckPath: /healthz

  # ─── Frontend ───────────────────────────────────────────────────────
  - type: web
    name: aiops5g-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: ./dist
    routes:
      - { type: rewrite, source: /*, destination: /index.html }
    envVars:
      - { key: VITE_API_BASE, value: "" }   # see note in README — set manually
